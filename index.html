<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Odfiz POS 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .product-card { cursor: pointer; transition: 0.2s; border: none; border-radius: 12px; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cart-section { background: white; height: 100vh; position: sticky; top: 0; border-left: 1px solid #dee2e6; }
        .btn-primary { background-color: #2196F3; border: none; }
    </style>
</head>
<body x-data="posSystem()">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-8 p-4">
                <h4 class="mb-4 fw-bold text-primary">Odfiz POS <span class="badge bg-info text-dark fs-6">2026</span></h4>
                <div class="row g-3">
                    <template x-for="item in products" :key="item.id">
                        <div class="col-6 col-lg-4">
                            <div class="card product-card shadow-sm p-3" @click="addToCart(item)">
                                <div class="fw-bold" x-text="item.name"></div>
                                <div class="text-muted small">Rp <span x-text="item.price.toLocaleString()"></span></div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="col-md-4 cart-section p-4 shadow-sm">
                <h5 class="fw-bold mb-3">Pesanan Baru</h5>
                <hr>
                <div style="height: 60vh; overflow-y: auto;">
                    <template x-for="(cartItem, index) in cart" :key="index">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <div class="fw-bold text-truncate" style="max-width: 150px;" x-text="cartItem.name"></div>
                                <small class="text-muted" x-text="'Rp ' + cartItem.price.toLocaleString()"></small>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn btn-sm btn-outline-danger" @click="removeFromCart(index)">×</button>
                            </div>
                        </div>
                    </template>
                </div>
                
                <div class="mt-auto border-top pt-3">
                    <div class="d-flex justify-content-between mb-2">
                        <span>Total:</span>
                        <h4 class="fw-bold text-primary">Rp <span x-text="totalPrice().toLocaleString()"></span></h4>
                    </div>
                    <button class="btn btn-primary w-100 py-3 fw-bold" @click="checkout()">BAYAR SEKARANG</button>
                    <button class="btn btn-light w-100 mt-2 text-danger" @click="cart = []">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function posSystem() {
            return {
                products: [
                    { id: 1, name: 'Sabun Cuci Piring', price: 5000 },
                    { id: 2, name: 'Sikat Lantai Kayu', price: 15000 },
                    { id: 3, name: 'Cairan Pel Wangi', price: 12000 },
                    { id: 4, name: 'Sapu Ijuk Super', price: 25000 },
                    { id: 5, name: 'Kain Lap Microfiber', price: 8000 }
                ],
                cart: [],
                addToCart(product) {
                    this.cart.push({...product});
                },
                removeFromCart(index) {
                    this.cart.splice(index, 1);
                },
                totalPrice() {
                    return this.cart.reduce((sum, item) => sum + item.price, 0);
                },
                checkout() {
                    if(this.cart.length === 0) return alert('Keranjang kosong!');
                    alert('Transaksi Berhasil!\nTotal: Rp ' + this.totalPrice().toLocaleString());
                    this.cart = [];
                }
            }
        }
    </script>
</body>
</html>
